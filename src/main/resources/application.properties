spring.application.name=aneki
server.port=${PORT:8080}
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:*}
spring.docker.compose.enabled=false
springdoc.swagger-ui.path=/swagger-ui.html

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mydatabase}
spring.datasource.username=${DB_USER:myuser}
spring.datasource.password=${DB_PASSWORD:secret}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

app.jwt.secret=${JWT_SECRET:change-this-dev-secret-to-at-least-32-characters}
app.jwt.ttl-ms=${JWT_TTL_MS:604800000}
