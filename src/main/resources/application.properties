spring.application.name=aneki
server.port=${PORT:8080}
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:*}
spring.docker.compose.enabled=false
springdoc.swagger-ui.path=/swagger-ui.html

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aneki}?currentSchema=aneki

spring.jpa.properties.hibernate.default_schema=aneki

spring.flyway.default-schema=aneki
spring.flyway.schemas=aneki

spring.datasource.username=${DB_USER:elegantcone}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=${FLYWAY_ENABLED:false}

app.jwt.secret=${JWT_SECRET:change-this-dev-secret-to-at-least-32-characters}
app.jwt.ttl-ms=${JWT_TTL_MS:604800000}
app.auth.cookie-name=${AUTH_COOKIE_NAME:access_token}
app.auth.cookie-secure=${AUTH_COOKIE_SECURE:false}
app.auth.cookie-same-site=${AUTH_COOKIE_SAME_SITE:Lax}
