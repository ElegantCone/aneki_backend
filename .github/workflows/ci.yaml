name: CI for project

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
      registry_host:
        required: true
        type: string
      image_name:
        required: true
        type: string
    secrets:
      REGISTRY_TOKEN:
        required: true
      REGISTRY_USER:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: test
        run: mvn test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package Application
        run: mvn package -DskipTests

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: target/

  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry_host }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ inputs.registry_host }}/${{ inputs.image_name }}:${{ inputs.image_tag }}
            ${{ inputs.registry_host }}/${{ inputs.image_name }}:latest