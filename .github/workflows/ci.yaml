name: CI for project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: build
      #run: mvn spring-boot:build-image --file pom.xml
      run: mvn -B  package --file pom.xml

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Test
      run: mvn test

