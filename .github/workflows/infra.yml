name: Infrastructure

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    paths:
      - "prod/ansible/**"
      - "prod/argocd/**"

jobs:
  bootstrap-cluster:
    name: Bootstrap cluster with Ansible
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: python -m pip install --upgrade pip ansible

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add production host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Generate Ansible inventory
        run: |
          cat > /tmp/inventory.ini <<EOF
          [app]
          aneki_prod ansible_host=${{ secrets.SSH_HOST }} ansible_user=root ansible_ssh_common_args='-o ServerAliveInterval=30 -o ServerAliveCountMax=6'
          EOF

      - name: Install Kubernetes cluster
        run: |
          ansible-playbook \
            -i /tmp/inventory.ini \
            prod/ansible/k8s-install.yml

      - name: Bootstrap Kubernetes workloads
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          ansible-playbook \
            -i /tmp/inventory.ini \
            prod/ansible/k8s-deploy.yml \
            --extra-vars "registry_host=aneki-registry.registry.twcstorage.ru registry_user=${{ secrets.REGISTRY_USERNAME }} registry_token=${{ secrets.REGISTRY_TOKEN }}"
