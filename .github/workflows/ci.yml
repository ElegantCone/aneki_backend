name: CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

env:
  BACKEND_DIR: backend
  FRONTEND_DIR: frontend
  FRONTEND_REPOSITORY: ElegantCone/aneki_frontend
  REGISTRY_HOST: aneki-registry.registry.twcstorage.ru
  BACKEND_IMAGE: prod/aneki-backend
  FRONTEND_IMAGE: prod/aneki-frontend

jobs:
  backend:
    name: Backend build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          path: ${{ env.BACKEND_DIR }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: ${{ env.BACKEND_DIR }}/pom.xml

      - name: Test backend
        working-directory: ${{ env.BACKEND_DIR }}
        run: ./mvnw -q test

      - name: Build backend
        working-directory: ${{ env.BACKEND_DIR }}
        run: ./mvnw -q package -DskipTests

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: ${{ env.BACKEND_DIR }}/target/*.jar
          if-no-files-found: error

  frontend:
    name: Frontend build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPOSITORY }}
          path: ${{ env.FRONTEND_DIR }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Test frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm test

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.FRONTEND_DIR }}/dist
          if-no-files-found: error

  release:
    name: Release and deploy
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          path: ${{ env.BACKEND_DIR }}

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPOSITORY }}
          ref: master
          path: ${{ env.FRONTEND_DIR }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_DIR }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY_HOST }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY_HOST }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.FRONTEND_DIR }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY_HOST }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY_HOST }}/${{ env.FRONTEND_IMAGE }}:latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: pip install ansible

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to Kubernetes
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i prod/ansible/inventory.ini \
            prod/ansible/k8s-deploy.yml \
            --extra-vars "image_tag=${{ github.sha }} registry_host=${{ env.REGISTRY_HOST }} registry_user=${{ secrets.REGISTRY_USERNAME }} registry_token=${{ secrets.REGISTRY_TOKEN }}"
