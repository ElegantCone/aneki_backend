name: Telegram notification
description: Sends job status to Telegram bot.

inputs:
  bot-token:
    description: Telegram bot token from BotFather.
    required: true
  chat-id:
    description: Telegram chat id that receives notifications.
    required: true
  job-name:
    description: Human-readable pipeline job name.
    required: true
  job-status:
    description: GitHub Actions job status.
    required: true

runs:
  using: composite
  steps:
    - name: Send Telegram message
      shell: bash
      env:
        TELEGRAM_BOT_TOKEN: ${{ inputs.bot-token }}
        TELEGRAM_CHAT_ID: ${{ inputs.chat-id }}
        JOB_NAME: ${{ inputs.job-name }}
        JOB_STATUS: ${{ inputs.job-status }}
        REPOSITORY: ${{ github.repository }}
        WORKFLOW: ${{ github.workflow }}
        REF_NAME: ${{ github.ref_name }}
        SHA: ${{ github.sha }}
        ACTOR: ${{ github.actor }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        case "$JOB_STATUS" in
          success) STATUS_ICON="OK" ;;
          failure) STATUS_ICON="FAILED" ;;
          cancelled) STATUS_ICON="CANCELLED" ;;
          *) STATUS_ICON="$JOB_STATUS" ;;
        esac

        MESSAGE=$(cat <<EOF
        $STATUS_ICON $WORKFLOW / $JOB_NAME
        Repository: $REPOSITORY
        Branch: $REF_NAME
        Commit: ${SHA:0:7}
        Actor: $ACTOR
        Run: $RUN_URL
        EOF
        )

        curl --fail --silent --show-error \
          --request POST \
          --url "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
          --data-urlencode "text=${MESSAGE}"
