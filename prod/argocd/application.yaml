apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aneki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ElegantCone/aneki.git
    targetRevision: master
    path: prod/k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
