- name: Deploy Application to Kubernetes
  hosts: app
  become: true
  vars:
    app_namespace: default
    argocd_namespace: argocd
    argocd_install_manifest_url: https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
    argocd_application_manifest_path: /tmp/aneki-argocd-application.yaml
    db_user: "{{ lookup('env', 'DB_USER') }}"
    db_password: "{{ lookup('env', 'DB_PASSWORD') }}"
    jwt_secret: "{{ lookup('env', 'JWT_SECRET') }}"

  tasks:
    - name: Validate required secret environment variables
      assert:
        that:
          - db_user | length > 0
          - db_password | length > 0
          - jwt_secret | length > 0
        fail_msg: DB_USER, DB_PASSWORD and JWT_SECRET must be provided through environment variables or Ansible Vault.
      no_log: true

    - name: Verify kubectl is installed on the target host
      command: kubectl version --client
      changed_when: false

    - name: Install Metrics Server
      command: kubectl apply --validate=false -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
      register: metrics_server_install
      retries: 5
      delay: 15
      until: metrics_server_install.rc == 0

    - name: Check whether metrics-server already uses insecure kubelet TLS
      command: kubectl get deployment metrics-server -n kube-system -o jsonpath={.spec.template.spec.containers[0].args}
      register: metrics_server_args
      changed_when: false

    - name: Patch metrics-server to allow insecure kubelet TLS
      shell: |
        kubectl patch deployment metrics-server \
          -n kube-system \
          --type='json' \
          -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
      when: "'--kubelet-insecure-tls' not in metrics_server_args.stdout"
      register: metrics_server_patch
      retries: 5
      delay: 10
      until: metrics_server_patch.rc == 0

    - name: Install Helm
      shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args: { creates: /usr/local/bin/helm }

    - name: Deploy NGINX Ingress Controller
      shell: |
        helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
        helm repo update
        helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
          --namespace ingress-nginx --create-namespace \
          --set controller.hostNetwork=true \
          --set controller.dnsPolicy=ClusterFirstWithHostNet \
          --set controller.service.type=ClusterIP

    - name: Deploy Prometheus and Grafana
      shell: |
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update
        helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
          --namespace monitoring --create-namespace \
          --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
          --set prometheus.prometheusSpec.scrapeInterval=2s \
          --set prometheus.prometheusSpec.evaluationInterval=2s \
          --set grafana.sidecar.dashboards.enabled=true \
          --set grafana.sidecar.dashboards.searchNamespace=ALL \
          --set grafana.service.type=NodePort \
          --set grafana.service.nodePort=30090

    - name: Copy SQL init script to server
      copy:
        src: "../db_init/db_init.sql"
        dest: "/tmp/db_init.sql"

    - name: Create ConfigMap for DB Init script
      shell: |
        kubectl create configmap postgres-init-config \
          --from-file=db_init.sql=/tmp/db_init.sql \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Create application namespace
      command: kubectl create namespace {{ app_namespace }}
      register: create_app_namespace
      failed_when:
        - create_app_namespace.rc != 0
        - "'AlreadyExists' not in create_app_namespace.stderr"
      changed_when: create_app_namespace.rc == 0

    - name: Create database credentials secret
      shell: |
        kubectl create secret generic aneki-db \
          --namespace={{ app_namespace }} \
          --from-literal=username={{ db_user | quote }} \
          --from-literal=password={{ db_password | quote }} \
          --dry-run=client -o yaml | kubectl apply -f -
      no_log: true

    - name: Create application credentials secret
      shell: |
        kubectl create secret generic aneki-app \
          --namespace={{ app_namespace }} \
          --from-literal=jwt-secret={{ jwt_secret | quote }} \
          --dry-run=client -o yaml | kubectl apply -f -
      no_log: true

    - name: Create Registry Secret
      shell: |
        kubectl create secret docker-registry twc-registry-key \
          --namespace={{ app_namespace }} \
          --docker-server={{ registry_host }} \
          --docker-username={{ registry_user }} \
          --docker-password={{ registry_token }} \
          --dry-run=client -o yaml | kubectl apply -f -
      no_log: true

    - name: Create Argo CD namespace
      command: kubectl create namespace {{ argocd_namespace }}
      register: create_argocd_namespace
      failed_when:
        - create_argocd_namespace.rc != 0
        - "'AlreadyExists' not in create_argocd_namespace.stderr"
      changed_when: create_argocd_namespace.rc == 0

    - name: Install Argo CD
      command: kubectl apply --server-side --force-conflicts --validate=false -n {{ argocd_namespace }} -f {{ argocd_install_manifest_url }}
      register: argocd_install
      retries: 5
      delay: 15
      until: argocd_install.rc == 0

    - name: Wait for Argo CD server deployment to become available
      command: kubectl rollout status deployment/argocd-server -n {{ argocd_namespace }} --timeout=180s

    - name: Wait for Argo CD repo server deployment to become available
      command: kubectl rollout status deployment/argocd-repo-server -n {{ argocd_namespace }} --timeout=180s

    - name: Wait for Argo CD application controller statefulset to become ready
      command: kubectl rollout status statefulset/argocd-application-controller -n {{ argocd_namespace }} --timeout=180s

    - name: Copy Argo CD application manifest to server
      copy:
        src: "../argocd/application.yaml"
        dest: "{{ argocd_application_manifest_path }}"

    - name: Apply Argo CD application manifest
      command: kubectl apply -f {{ argocd_application_manifest_path }}
