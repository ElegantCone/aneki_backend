- name: Deploy Application to Kubernetes
  hosts: app
  become: true
  vars:
    k8s_dir: /opt/aneki/k8s

  tasks:
    - name: Install Metrics Server
      shell: |
        kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
        kubectl patch deployment metrics-server -n kube-system --type='json' -p='[{"op": "add", "path": "/spec/template/spec/containers/0/args/-", "value": "--kubelet-insecure-tls"}]'

    - name: Install Helm
      shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args: { creates: /usr/local/bin/helm }

    - name: Deploy Prometheus and Grafana
      shell: |
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update
        helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
          --namespace monitoring --create-namespace \
          --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
          --set grafana.service.type=NodePort \
          --set grafana.service.nodePort=30090

    - name: Copy SQL init script to server
      copy:
        src: "../db_init/db_init.sql"
        dest: "/tmp/db_init.sql"

    - name: Create ConfigMap for DB Init script
      shell: |
        kubectl create configmap postgres-init-config \
          --from-file=db_init.sql=/tmp/db_init.sql \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Create Registry Secret (if it does not exist)
      shell: |
        kubectl create secret docker-registry twc-registry-key \
          --docker-server={{ registry_host }} \
          --docker-username={{ registry_user }} \
          --docker-password={{ registry_token }} \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Render K8s Manifest
      template:
        src: "../k8s/app.yml.j2"
        dest: "{{ k8s_dir }}/app.yaml"

    - name: Apply Manifests
      command: kubectl apply -f {{ k8s_dir }}/app.yaml