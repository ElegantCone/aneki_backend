- name: Install Kubernetes Cluster
  hosts: app
  become: true
  tasks:
    - name: Disable swap (K8s requirement)
      shell: |
        swapoff -a
        sed -i '/swap/d' /etc/fstab

    - name: Configure modules for containerd
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: Load modules
      shell: |
        modprobe overlay
        modprobe br_netfilter

    - name: Set sysctl params for K8s
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1

    - name: Apply sysctl params
      command: sysctl --system

    - name: Install dependencies
      apt:
        name: [ apt-transport-https, ca-certificates, curl, gpg, conntrack ]
        state: present
        update_cache: true

    - name: Ensure containerd config directory exists
      file:
        path: /etc/containerd
        state: directory

    - name: Generate default containerd config
      shell: containerd config default > /etc/containerd/config.toml

    - name: Set SystemdCgroup to true in containerd
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Restart and enable containerd
      systemd:
        name: containerd
        state: restarted
        enabled: yes

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Kubernetes GPG key
      shell: curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.31/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add Kubernetes repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.31/deb/ /"
        state: present
        filename: kubernetes

    - name: Install K8s components
      apt:
        name: [ kubelet, kubeadm, kubectl ]
        state: present
        update_cache: true

    - name: Hold K8s components versions
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop: [ kubelet, kubeadm, kubectl ]

    - name: Initialize Kubernetes cluster
      command: kubeadm init --pod-network-cidr=10.244.0.0/16 --ignore-preflight-errors=Mem
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Setup kubeconfig for root user
      shell: |
        mkdir -p /root/.kube
        cp -i /etc/kubernetes/admin.conf /root/.kube/config
        chown root:root /root/.kube/config
      args:
        creates: /root/.kube/config

    - name: Install Flannel network plugin
      command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml

    - name: Wait for Flannel to settle
      pause:
        seconds: 10

    - name: Allow pods to run on master (Untaint)
      command: kubectl taint nodes --all node-role.kubernetes.io/control-plane-
      ignore_errors: true # Если таинт уже снят, чтобы не падал плейбук