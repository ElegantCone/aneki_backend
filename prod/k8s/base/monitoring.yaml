apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: backend
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http-metrics
      path: /actuator/prometheus
      interval: 2s
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aneki-backend-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  aneki-backend.json: |
    {
      "title": "Aneki Backend",
      "uid": "aneki-backend",
      "schemaVersion": 39,
      "refresh": "2s",
      "time": {
        "from": "now-5m",
        "to": "now"
      },
      "tags": [
        "aneki",
        "backend"
      ],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "label": "Datasource",
            "type": "datasource",
            "hide": 2,
            "query": "prometheus",
            "current": {
              "text": "Prometheus",
              "value": "prometheus"
            }
          },
          {
            "name": "pod",
            "label": "Pod",
            "type": "query",
            "datasource": "${datasource}",
            "query": "label_values(kube_pod_info{pod=~\"backend-.*\"}, pod)",
            "includeAll": true,
            "multi": true,
            "allValue": ".*",
            "current": {
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "HTTP requests by pod",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            }
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(http_server_requests_seconds_count{pod=~\"$pod\"}[5m]))",
              "legendFormat": "{{ '{{' }}pod{{ '}}' }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "JVM memory by pod",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          },
          "targets": [
            {
              "expr": "sum by (pod, area) (jvm_memory_used_bytes{pod=~\"$pod\"})",
              "legendFormat": "{{ '{{' }}pod{{ '}}' }} {{ '{{' }}area{{ '}}' }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Process CPU by pod",
          "type": "timeseries",
          "datasource": "${datasource}",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            }
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(process_cpu_usage{pod=~\"$pod\"}[5m]))",
              "legendFormat": "{{ '{{' }}pod{{ '}}' }}",
              "refId": "A"
            }
          ]
        }
      ]
    }
