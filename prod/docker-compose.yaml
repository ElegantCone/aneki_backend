services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: aneki
      POSTGRES_USER: elegantcone
      POSTGRES_PASSWORD: aneki_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prod/db_init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U elegantcone -d aneki" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: aneki-registry.registry.twcstorage.ru/prod/aneki-backend:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aneki
      DB_USER: elegantcone
      DB_PASSWORD: aneki_password
      JWT_SECRET: change-this-prod-secret-to-at-least-32-characters
      CORS_ALLOWED_ORIGIN: "*"
    ports:
      - "8080:8080"

  frontend:
    image: aneki-registry.registry.twcstorage.ru/prod/aneki-frontend:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
